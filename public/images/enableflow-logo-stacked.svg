<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" width="160" height="120">
  <defs>
    <linearGradient id="chev3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Chevrons — centered horizontally in 160px -->
  <!-- Chevron group is 56px wide, centered at x=80, so starts at x=52 -->
  <!-- Chevron 1 -->
  <path d="M 52 8 L 70 36 L 52 64"
        fill="none" stroke="#14b8a6" stroke-width="5.5"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.22"/>
  <!-- Chevron 2 -->
  <path d="M 66 8 L 84 36 L 66 64"
        fill="none" stroke="#06b6d4" stroke-width="5.5"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
  <!-- Chevron 3 -->
  <path d="M 80 8 L 98 36 L 80 64"
        fill="none" stroke="url(#chev3)" stroke-width="5.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- EnableFlow centered -->
  <text x="80" y="90" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="22" font-weight="700" fill="#0f172a" letter-spacing="-0.3">Enable<tspan fill="#0d9488">Flow</tspan></text>
  <!-- AI centered below -->
  <text x="80" y="110" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="11" font-weight="700" fill="#7c3aed" letter-spacing="3">AI</text>
</svg>
