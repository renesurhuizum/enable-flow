<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 60" width="300" height="60">
  <defs>
    <linearGradient id="chev3r" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="300" height="60" rx="0" fill="#0f172a"/>

  <!-- Chevron 1 -->
  <path d="M 10 6 L 28 30 L 10 54"
        fill="none" stroke="white" stroke-width="5.5"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.18"/>
  <!-- Chevron 2 -->
  <path d="M 24 6 L 42 30 L 24 54"
        fill="none" stroke="white" stroke-width="5.5"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <!-- Chevron 3 (light gradient) -->
  <path d="M 38 6 L 56 30 L 38 54"
        fill="none" stroke="url(#chev3r)" stroke-width="5.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- White wordmark -->
  <text x="76" y="39"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="28" font-weight="700" fill="white" letter-spacing="-0.5">Enable<tspan fill="#5eead4">Flow</tspan></text>
  <text x="238" y="26"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="12" font-weight="700" fill="#c4b5fd" letter-spacing="1">AI</text>
</svg>
